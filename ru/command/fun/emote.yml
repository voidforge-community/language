# Конфигурация v3 создан 26.10.2025
emote:
  # Описание команды и опций
  description:
    command: "Эмоции рулят юхууу"
    option:
      choice: "Выбери любимую эмоцию"
      user: "выбери пользователя для совместной эмоции"

  embed:
    title: "%user-author% использовал %emote%"
    description: "%emote-description%"
    footer: "Время вызова: %current-time% | VoidBot %version:BOT% :3"

  # Локализоаванные Названия эмоций
  type:
    hug: "Обнять"
    kiss: "Поцеловать"
    pat: "Погладить"
    slap: "Пощёчина"
    cuddle: "Прижатся"
    baka: "Бака"
    blush: "Покраснеть"
    laugh: "Смеяться"
    smile: "Улыбка"
    love: "Любовь"
    poke: "Тыкнуть"
    highfive: "Дай пять"
    happy: "Счастливый"
    wave: "Махать"
    sleepy: "Сонный"
    facepalm: "Фейспалм"
    dance: "Танцевать"
    shocked: "Шок"
    pout: "Надуться"
    cry: "Плакать"
    wink: "Подмигнуть"
    amazing: "Удивительно"
    nom: "Кусать"
    tickle: "Щекотать"
    uwu: "Уву"
  # Если при вводе команды упомянул
  type-mentioned:
    hug: "%user-author% обнял(а) %user-mentioned%"
    kiss: "%user-author% поцеловал(а) %user-mentioned%"
    pat: "%user-author% погладил(а) %user-mentioned%"
    slap: "%user-author% дал(а) пощёчину %user-mentioned%"
    cuddle: "%user-author% прижался(ась) к %user-mentioned%"
    baka: "%user-author% назвал(а) %user-mentioned% бака!"
    blush: "%user-author% покраснел(а) рядом с %user-mentioned%"
    laugh: "%user-author% смеётся вместе с %user-mentioned%"
    smile: "%user-author% улыбается %user-mentioned%"
    love: "%user-author% признался(ась) в любви %user-mentioned%"
    poke: "%user-author% ткнул(а) %user-mentioned%"
    highfive: "%user-author% дал(а) пять %user-mentioned%"
    happy: "%user-author% счастлив с %user-mentioned%"
    wave: "%user-author% машет рукой %user-mentioned%"
    sleepy: "%user-author% зевает рядом с %user-mentioned%"
    facepalm: "%user-author% делает фейспалм из-за %user-mentioned%"
    dance: "%user-author% танцует с %user-mentioned%"
    shocked: "%user-author% в шоке от %user-mentioned%"
    pout: "%user-author% надувается на %user-mentioned%"
    cry: "%user-author% плачет из-за %user-mentioned%"

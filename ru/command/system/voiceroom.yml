voiceroom:
  description:
    command: "Создать сообщение с кнопками для управления приватными голосовыми комнатами"
  embed:
    title: "Управление приватной комнатой"
    description: |-
      Здесь вы можете управлять своей приватной голосовой комнатой.
      Зайдите в голосовой канал создания, чтобы получить личную комнату, и используйте кнопки ниже для её настройки:

      ✏️ **Изменить название** — задаёт новое имя комнаты
      👥 **Лимит пользователей** — ограничивает число участников (0 — без лимита)
      🔒 **Закрыть комнату** — запретить вход новым участникам
      🔓 **Открыть комнату** — разрешить вход новым участникам
      🚫 **Запретить доступ** — забрать доступ у конкретного участника
      🗝 **Выдать доступ** — разрешить вход конкретному участнику
      ⚡ **Кикнуть** — выгнать участника из комнаты
      🔇 **Запретить говорить** — запретить участнику говорить
      🎤 **Разрешить говорить** — вернуть участнику право говорить
      🔁 **Передать владельца** — передать управление комнатой другому участнику
    footer: "VoidBot — Приватные комнаты"
  button:
    rename: "Название"
    limit: "Лимит"
    lock: "Закрыть"
    unlock: "Открыть"
    deny: "Запр. доступ"
    grant: "Выдать доступ"
    kick: "Кик"
    mute: "Тихо"
    unmute: "Говорить"
    transfer: "Передать"
  modal:
    rename:
      title: "Название комнаты"
      label: "Новое название"
      placeholder: "Введите новое название комнаты..."
    limit:
      title: "Лимит пользователей"
      label: "Лимит (0 — без лимита)"
      placeholder: "Число от 0 до 99"
  select:
    grant:
      placeholder: "Выберите участника, которому выдать доступ"
    deny:
      placeholder: "Выберите участника, у которого забрать доступ"
    kick:
      placeholder: "Выберите участника для кика из комнаты"
    mute:
      placeholder: "Выберите участника, которому запретить говорить"
    unmute:
      placeholder: "Выберите участника, которому разрешить говорить"
    transfer:
      placeholder: "Выберите нового владельца комнаты"
    prompt: "Выберите участника в комнате"
  notice:
    posted: "Панель управления приватными комнатами отправлена в канал."
    no-channel: "Канал приватных комнат не настроен в config.yml (voice-room.text-channel)."
    no-create-channel: "Голосовой канал создания не настроен в config.yml (voice-room.create-channel)."
    no-room: "У вас нет приватной комнаты. Зайдите в голосовой канал создания, чтобы получить её."
    renamed: "Название комнаты обновлено."
    limit-set: "Лимит пользователей обновлён."
    locked: "Комната закрыта: новые участники не могут войти."
    unlocked: "Комната открыта: новые участники могут войти."
    granted: "Доступ выдан участнику %target%."
    denied: "Доступ забран у участника %target%."
    kicked: "Участник %target% кикнут из комнаты."
    muted: "Участнику %target% запрещено говорить."
    unmuted: "Участнику %target% разрешено говорить."
    transferred: "Владение комнатой передано участнику %target%."
    no-target: "Не выбран участник."
    not-in-room: "Этот участник не в вашей комнате."
    cannot-self: "Нельзя выбрать самого себя."
    forbidden: "У вас нет прав на это действие."
    invalid-limit: "Лимит должен быть числом от 0 до 99."
    invalid-name: "Название не может быть пустым."
  error:
    disabled: "Система приватных комнат отключена в config.yml."
    channel-not-found: "Не удалось найти настроенный канал."
    generic: "Произошла ошибка при выполнении действия."
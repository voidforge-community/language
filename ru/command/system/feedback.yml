feedback:
  description:
    command: "Создать сообщение с кнопками для предложений и жалоб"
  embed:
    title: "Обратная связь"
    description: "Выберите тип обращения, нажав на одну из кнопок ниже:"
    footer: "VoidBot"
  button:
    idea: "Предложения и идеи"
    mod: "Жалоба на модерацию"
    user: "Жалоба на пользователя"
    approve: "Одобрить"
    reject: "Отклонить"
  select:
    mod:
      placeholder: "Выберите модератора"
    user:
      placeholder: "Выберите пользователя"
    prompt: "Выберите пользователя для подачи жалобы"
  modal:
    idea:
      title: "Предложение/идея"
    mod:
      title: "Жалоба на модератора"
    user:
      title: "Жалоба на пользователя"
    reason:
      label: "Текст обращения"
      placeholder: "Опишите подробно вашу идею или жалобу..."
    reject:
      title: "Причина отклонения"
    reason.reject:
      label: "Причина отклонения"
      placeholder: "Укажите причину отклонения обращения..."
  status:
    approved: "✅ Одобрено"
    rejected: "❌ Отклонено"
  field:
    author: "Автор"
    target: "Цель жалобы"
    content: "Описание"
    approved-by: "Одобрил модератор"
    rejected-by: "Отклонил модератор"
    rejected-reason: "Причина отклонения"
    moderator: "Модератор"
  footer:
    pending: "Ожидает рассмотрения"
    decided: "Решение принято"
  dm:
    approved:
      title: "Ваше обращение одобрено"
      description: "Ваше обращение на сервере %server% было одобрено модератором %moderator%."
    rejected:
      title: "Ваше обращение отклонено"
      description: "Ваше обращение на сервере %server% было отклонено модератором %moderator%."
    footer: "VoidBot — Обратная связь"
  notice:
    approved: "Обращение одобрено, автор уведомлён в ЛС."
    rejected: "Обращение отклонено, автор уведомлён в ЛС."
  error:
    empty: "Текст обращения не может быть пустым."
    channel: "Канал для отправки не настроен. Обратитесь к администрации."
    no-permission: "У вас нет прав для рассмотрения обращений."
    no-message: "Не удалось найти исходное сообщение."
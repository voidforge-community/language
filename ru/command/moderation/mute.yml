mute:
  # Описание команды и опций
  description:
    command: "Мутит пользователя на сервере"
    option:
      target-user: "Выберете пользователя"
      time: "Длительность таймаут"
      reason: "Причина блокировки"
  embed:
    title: "Пользователь успешно замучен с сервера!"
    description: "%mute-description"
    footer: "Время вызова: %current-time% | VoidBot %version:BOT% :3"
  status:
    forever: "Пользователь %target-user% был отправлен в таймаут модератором %author% на 28 дней по причине %reason%"
    time: "Пользователь %target-user% был отправлен в таймаут модератором %author% на %time% по причине %reason%"
  local-time:
    mount: "месяц"
    mounts: "месяца"
    week: "неделя"
    weeks: "недели"
    day: "день"
    days: "дни"
    hour: "час"
    hours: "часы"
    minute: "минута"
    minutes: "минуты"
    second: "секунда"
    seconds: "секунды"
  error:
    low-level-permission:
      author: "Вашего приоритета нехватает что-бы замутить данного пользователя"
      bot: "Моего приоритета нехватает чтобы замутить данного пользователя"
    ## Ошибка на случай если дс вернет криво юзера
    user-not-found: "Данный пользователь не найден"
    not-corrected: |
      Время не правильно указано!
      Подсказка:
      - mount- месяц
      - w/week- неделя
      - d/day- день
      - h/hr/hour- час
      - m/min/minute- минута
      - s/sec/second- секунда
      Пример 1mount1w1d1h1m1s (1 месяц 1 неделя 1 день 1 час 1 минута 1 секунда)
    other: "%code%"

